name: Publish package to registry

on:
  release:
    types:
      - released

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git user email
        run: git config --global user.email "${{ github.event.release.author.email }}"

      - name: Configure git user name
        run: git config --global user.name "${{ github.event.release.author.login }}"

      - name: Change package version
        run: bun pm version ${{ github.event.release.tag_name }} --no-git-checks

      - name: Build package and bundle source
        run: bun run build

      - name: Publish package to registry
        run: bun publish --no-git-checks
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
